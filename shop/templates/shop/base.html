<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 0;">

    <header style="background-color: #333; color: white; padding: 15px 20px;">
        <h1 style="margin: 0; display: inline-block;">MotoGrand</h1>
        <nav style="display: inline-block; margin-left: 20px;">
            <a href="{% url 'home' %}" style="color: white; margin-right: 15px; text-decoration: none;">Головна</a>
            <a href="{% url 'about' %}" style="color: white; margin-right: 15px; text-decoration: none;">Про нас</a>

            <span style="margin-left: 20px; color: #ff9800;"><b>Категорії:</b></span>
            {% for cat in categories %}
                <a href="{% url 'category' cat.id %}" style="color: #ff9800; margin-left: 10px; text-decoration: none;">{{ cat.name }}</a>
            {% endfor %}
        </nav>
    </header>

    <main style="padding: 20px; min-height: 400px;">
        {% block content %}
        {% endblock %}
    </main>

    <footer style="background-color: #222; color: #aaa; text-align: center; padding: 20px; margin-top: 20px;">
        <p>&copy; 2026 MotoGrand. Всі права захищено.</p>
        <p>Найкращі мотозапчастини в Україні. Швидка доставка.</p>
    </footer>

</body>
</html>
